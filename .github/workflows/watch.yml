name: job-watch

on:
  schedule:
    # Native GitHub cron, kept as a redundant backup. Reliable at this
    # coarser interval (GitHub's scheduler drops most firings for
    # high-frequency crons like */5, but 8-hourly is fine). The primary
    # trigger is an external pinger (cron-job.org) calling the
    # workflow_dispatch API below on the same 8h cadence.
    - cron: "0 */8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: job-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run watcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python watcher.py

      - name: Commit updated state
        run: |
          git config user.name "job-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/seen.json
          if ! git diff --cached --quiet; then
            git commit -m "update seen state [skip ci]"
            git pull --rebase origin main
            git push
          fi
